global:
  scrape_interval: 5s
  evaluation_interval: 5s
rule_files: ["/etc/prometheus/rules/*.yml"]
alerting:
  alertmanagers:
    - static_configs: [{targets: ["alertmanager:9093"]}]
scrape_configs:
  - job_name: prometheus
    static_configs: [{targets: ["localhost:9090"]}]
  - job_name: api
    metrics_path: /metrics
    dns_sd_configs: [{names: ["api"], type: A, port: 8000}]
  - job_name: worker
    dns_sd_configs: [{names: ["worker"], type: A, port: 9101}]
  - job_name: relay
    static_configs: [{targets: ["outbox-relay:9102"]}]
  - job_name: agent
    static_configs: [{targets: ["agent:9103"]}]

