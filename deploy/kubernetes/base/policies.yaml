apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: default-deny}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-dns}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: kube-system}}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: nginx-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: nginx}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ipBlock: {cidr: 0.0.0.0/0}}]
      ports: [{protocol: TCP, port: 8080}, {protocol: TCP, port: 8443}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: api}}}]
      ports: [{protocol: TCP, port: 8000}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: api-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: api}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - {podSelector: {matchLabels: {app.kubernetes.io/name: nginx}}}
        - {podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}
      ports: [{protocol: TCP, port: 8000}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: postgres}}}]
      ports: [{protocol: TCP, port: 5432}]
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: redis}}}]
      ports: [{protocol: TCP, port: 6379}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: worker-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: worker}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 9101}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: postgres}}}]
      ports: [{protocol: TCP, port: 5432}]
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: redis}}}]
      ports: [{protocol: TCP, port: 6379}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: relay-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: outbox-relay}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 9102}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: postgres}}}]
      ports: [{protocol: TCP, port: 5432}]
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: redis}}}]
      ports: [{protocol: TCP, port: 6379}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: agent-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: agent}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 9103}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: nginx}}}]
      ports: [{protocol: TCP, port: 8443}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: postgres-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: postgres}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - {podSelector: {matchLabels: {app.kubernetes.io/name: api}}}
        - {podSelector: {matchLabels: {app.kubernetes.io/name: worker}}}
        - {podSelector: {matchLabels: {app.kubernetes.io/name: outbox-relay}}}
      ports: [{protocol: TCP, port: 5432}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: redis-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: redis}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - {podSelector: {matchLabels: {app.kubernetes.io/name: api}}}
        - {podSelector: {matchLabels: {app.kubernetes.io/name: worker}}}
        - {podSelector: {matchLabels: {app.kubernetes.io/name: outbox-relay}}}
      ports: [{protocol: TCP, port: 6379}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: prometheus-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: grafana}}}]
      ports: [{protocol: TCP, port: 9090}]
  egress:
    - to:
        - {podSelector: {matchLabels: {app.kubernetes.io/name: api}}}
      ports: [{protocol: TCP, port: 8000}]
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: worker}}}]
      ports: [{protocol: TCP, port: 9101}]
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: outbox-relay}}}]
      ports: [{protocol: TCP, port: 9102}]
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: agent}}}]
      ports: [{protocol: TCP, port: 9103}]
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: alertmanager}}}]
      ports: [{protocol: TCP, port: 9093}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: alertmanager-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: alertmanager}}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 9093}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: grafana-boundary}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: grafana}}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ipBlock: {cidr: 0.0.0.0/0}}]
      ports: [{protocol: TCP, port: 3000}]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: prometheus}}}]
      ports: [{protocol: TCP, port: 9090}]

