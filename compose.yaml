name: fleetpulse

services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: fleetpulse
      POSTGRES_USER: fleetpulse
      POSTGRES_PASSWORD: ${FLEETPULSE_POSTGRES_PASSWORD:?set FLEETPULSE_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetpulse -d fleetpulse"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - data

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      FLEETPULSE_AGENT_TOKEN: ${FLEETPULSE_AGENT_TOKEN:?set FLEETPULSE_AGENT_TOKEN}
      FLEETPULSE_DATABASE_URL: postgresql+asyncpg://fleetpulse:${FLEETPULSE_POSTGRES_PASSWORD}@postgres:5432/fleetpulse
      FLEETPULSE_ENVIRONMENT: local-compose
      FLEETPULSE_LOG_LEVEL: INFO
      FLEETPULSE_REDIS_URL: redis://redis:6379/0
      FLEETPULSE_CACHE_ENABLED: ${FLEETPULSE_CACHE_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2)",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 8s
    restart: unless-stopped
    networks:
      - edge
      - data

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      FLEETPULSE_AGENT_ID: compose-agent-1
      FLEETPULSE_AGENT_TOKEN: ${FLEETPULSE_AGENT_TOKEN:?set FLEETPULSE_AGENT_TOKEN}
      FLEETPULSE_API_URL: https://nginx:8443
      FLEETPULSE_CA_BUNDLE: /etc/fleetpulse/tls/ca.crt
      FLEETPULSE_BATCH_SIZE: 2
      FLEETPULSE_COLLECTION_INTERVAL_SECONDS: 2
      FLEETPULSE_HOSTNAME: compose-agent
      FLEETPULSE_LOG_LEVEL: INFO
      FLEETPULSE_SPOOL_PATH: /var/lib/fleetpulse/spool.db
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    restart: unless-stopped
    volumes:
      - agent_spool:/var/lib/fleetpulse
      - ./certs/generated/ca.crt:/etc/fleetpulse/tls/ca.crt:ro
    networks:
      - edge

  nginx:
    image: nginx:1.29-alpine@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/generated:/etc/nginx/tls:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:8443/livez"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - edge

  outbox-relay:
    build:
      context: .
      dockerfile: services/outbox_relay/Dockerfile
    environment: &worker-environment
      FLEETPULSE_DATABASE_URL: postgresql+asyncpg://fleetpulse:${FLEETPULSE_POSTGRES_PASSWORD}@postgres:5432/fleetpulse
      FLEETPULSE_REDIS_URL: redis://redis:6379/0
      FLEETPULSE_LOG_LEVEL: INFO
      FLEETPULSE_RECLAIM_IDLE_MS: 1000
      FLEETPULSE_MAX_DELIVERY_ATTEMPTS: 3
      FLEETPULSE_METRICS_PORT: 9102
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 5s
      timeout: 2s
      retries: 3
    restart: unless-stopped
    networks:
      - data

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      <<: *worker-environment
      FLEETPULSE_METRICS_PORT: 9101
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 5s
      timeout: 2s
      retries: 3
    restart: unless-stopped
    networks:
      - data

  assistant:
    profiles: ["ai"]
    build:
      context: .
      dockerfile: services/assistant/Dockerfile
    environment:
      FLEETPULSE_ASSISTANT_PROVIDER: ${FLEETPULSE_ASSISTANT_PROVIDER:-offline}
      FLEETPULSE_ASSISTANT_API_KEY: ${FLEETPULSE_ASSISTANT_API_KEY:-}
      FLEETPULSE_ASSISTANT_MODEL: ${FLEETPULSE_ASSISTANT_MODEL:-gpt-5-mini}
      FLEETPULSE_ASSISTANT_LOG_LEVEL: INFO
    ports: ["127.0.0.1:8081:8081"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz', timeout=2)",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    networks:
      - edge

  prometheus:
    image: prom/prometheus:v3.5.0@sha256:63805ebb8d2b3920190daf1cb14a60871b16fd38bed42b857a3182bc621f4996
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports: ["127.0.0.1:9090:9090"]
    networks: [edge, data]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: ["127.0.0.1:9093:9093"]
    networks: [edge, data]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0@sha256:6ac590e7cabc2fbe8d7b8fc1ce9c9f0582177b334e0df9c927ebd9670469440f
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports: ["127.0.0.1:3000:3000"]
    networks: [edge, data]
    restart: unless-stopped

networks:
  edge:
    internal: false
  data:
    internal: true

volumes:
  agent_spool:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
