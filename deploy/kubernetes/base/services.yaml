apiVersion: v1
kind: Service
metadata: {name: postgres}
spec:
  selector: {app.kubernetes.io/name: postgres}
  ports: [{name: postgres, port: 5432, targetPort: postgres}]
---
apiVersion: v1
kind: Service
metadata: {name: redis}
spec:
  selector: {app.kubernetes.io/name: redis}
  ports: [{name: redis, port: 6379, targetPort: redis}]
---
apiVersion: v1
kind: Service
metadata: {name: api}
spec:
  selector: {app.kubernetes.io/name: api}
  ports: [{name: http, port: 8000, targetPort: http}]
---
apiVersion: v1
kind: Service
metadata: {name: api-metrics}
spec:
  clusterIP: None
  publishNotReadyAddresses: false
  selector: {app.kubernetes.io/name: api}
  ports: [{name: metrics, port: 8000, targetPort: http}]
---
apiVersion: v1
kind: Service
metadata: {name: worker-metrics}
spec:
  clusterIP: None
  selector: {app.kubernetes.io/name: worker}
  ports: [{name: metrics, port: 9101, targetPort: metrics}]
---
apiVersion: v1
kind: Service
metadata: {name: outbox-relay}
spec:
  selector: {app.kubernetes.io/name: outbox-relay}
  ports: [{name: metrics, port: 9102, targetPort: metrics}]
---
apiVersion: v1
kind: Service
metadata: {name: agent-metrics}
spec:
  clusterIP: None
  selector: {app.kubernetes.io/name: agent}
  ports: [{name: metrics, port: 9103, targetPort: metrics}]
---
apiVersion: v1
kind: Service
metadata: {name: nginx}
spec:
  selector: {app.kubernetes.io/name: nginx}
  ports:
    - {name: http, port: 8080, targetPort: http}
    - {name: https, port: 8443, targetPort: https}
---
apiVersion: v1
kind: Service
metadata: {name: prometheus}
spec:
  selector: {app.kubernetes.io/name: prometheus}
  ports: [{name: http, port: 9090, targetPort: http}]
---
apiVersion: v1
kind: Service
metadata: {name: alertmanager}
spec:
  selector: {app.kubernetes.io/name: alertmanager}
  ports: [{name: http, port: 9093, targetPort: http}]
---
apiVersion: v1
kind: Service
metadata: {name: grafana}
spec:
  selector: {app.kubernetes.io/name: grafana}
  ports: [{name: http, port: 3000, targetPort: http}]

