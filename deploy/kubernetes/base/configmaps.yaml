apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetpulse-config
data:
  FLEETPULSE_ENVIRONMENT: local-kubernetes
  FLEETPULSE_LOG_LEVEL: INFO
  FLEETPULSE_REDIS_URL: redis://redis:6379/0
  FLEETPULSE_CACHE_ENABLED: "true"
  FLEETPULSE_RECLAIM_IDLE_MS: "1000"
  FLEETPULSE_MAX_DELIVERY_ATTEMPTS: "3"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {}
    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      map $http_x_request_id $correlation_id { default $http_x_request_id; "" $request_id; }
      upstream fleetpulse_api { zone fleetpulse_api 64k; server api:8000; keepalive 32; }
      server { listen 8080; return 308 https://$host:8443$request_uri; }
      server {
        listen 8443 ssl;
        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        client_max_body_size 2m;
        location = /nginx-health {
          access_log off;
          default_type text/plain;
          return 200 "ok\n";
        }
        location / {
          proxy_pass http://fleetpulse_api;
          proxy_connect_timeout 2s;
          proxy_read_timeout 10s;
          proxy_send_timeout 10s;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Request-ID $correlation_id;
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files: [/etc/prometheus/rules.yml]
    alerting:
      alertmanagers:
        - static_configs: [{targets: [alertmanager:9093]}]
    scrape_configs:
      - job_name: prometheus
        static_configs: [{targets: [localhost:9090]}]
      - job_name: api
        dns_sd_configs: [{names: [api-metrics.fleetpulse.svc.cluster.local], type: A, port: 8000}]
      - job_name: worker
        dns_sd_configs: [{names: [worker-metrics.fleetpulse.svc.cluster.local], type: A, port: 9101}]
      - job_name: relay
        static_configs: [{targets: [outbox-relay:9102]}]
      - job_name: agent
        dns_sd_configs: [{names: [agent-metrics.fleetpulse.svc.cluster.local], type: A, port: 9103}]
  rules.yml: |
    groups:
      - name: fleetpulse-slos
        rules:
          - record: fleetpulse:availability:ratio5m
            expr: sum(rate(fleetpulse_http_requests_total{status!~"5.."}[5m])) / clamp_min(sum(rate(fleetpulse_http_requests_total[5m])), 0.000001)
          - record: fleetpulse:ingestion_latency:p99_5m
            expr: histogram_quantile(0.99, sum by (le) (rate(fleetpulse_http_request_duration_seconds_bucket{route="/v1/telemetry/batches"}[5m])))
          - alert: FleetPulseAvailabilityBurn
            expr: fleetpulse:availability:ratio5m < 0.999
            for: 2m
            labels: {severity: warning}
            annotations: {summary: FleetPulse availability is below its 99.9% target}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    route:
      receiver: local-null
      group_by: [alertname]
    receivers:
      - name: local-null
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: FleetPulse
        folder: FleetPulse
        type: file
        options: {path: /var/lib/grafana/dashboards}
  fleetpulse.json: |
    {"title":"FleetPulse Reliability","uid":"fleetpulse-reliability","schemaVersion":39,"version":1,"panels":[{"type":"timeseries","title":"API request rate","targets":[{"expr":"sum(rate(fleetpulse_http_requests_total[5m]))"}],"gridPos":{"h":8,"w":12,"x":0,"y":0}},{"type":"timeseries","title":"p95 latency","targets":[{"expr":"histogram_quantile(0.95, sum by (le) (rate(fleetpulse_http_request_duration_seconds_bucket[5m])))"}],"gridPos":{"h":8,"w":12,"x":12,"y":0}},{"type":"stat","title":"Cache hit rate","targets":[{"expr":"sum(fleetpulse_cache_requests_total{status=\"hit\"}) / clamp_min(sum(fleetpulse_cache_requests_total),1)"}],"gridPos":{"h":8,"w":8,"x":0,"y":8}},{"type":"stat","title":"Worker events","targets":[{"expr":"sum(fleetpulse_worker_events_total)"}],"gridPos":{"h":8,"w":8,"x":8,"y":8}}]}
