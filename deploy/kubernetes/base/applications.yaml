---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app.kubernetes.io/name: nginx}
  template:
    metadata:
      labels: {app.kubernetes.io/name: nginx, app.kubernetes.io/part-of: fleetpulse}
    spec:
      terminationGracePeriodSeconds: 30
      securityContext: {runAsNonRoot: true, runAsUser: 101, runAsGroup: 101, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8080}
            - {name: https, containerPort: 8443}
          readinessProbe:
            httpGet: {scheme: HTTPS, path: /readyz, port: https}
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet: {scheme: HTTPS, path: /livez, port: https}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          lifecycle:
            preStop: {exec: {command: [sh, -c, "sleep 3"]}}
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 250m, memory: 128Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: config, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf, readOnly: true}
            - {name: tls, mountPath: /etc/nginx/tls, readOnly: true}
      volumes:
        - {name: config, configMap: {name: nginx-config}}
        - {name: tls, secret: {secretName: fleetpulse-tls}}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agent
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 1}
  selector:
    matchLabels: {app.kubernetes.io/name: agent}
  template:
    metadata:
      labels: {app.kubernetes.io/name: agent, app.kubernetes.io/part-of: fleetpulse}
    spec:
      terminationGracePeriodSeconds: 30
      securityContext: {runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, fsGroup: 999, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: agent
          image: fleetpulse-agent:dev
          imagePullPolicy: IfNotPresent
          env:
            - {name: FLEETPULSE_API_URL, value: "https://nginx:8443"}
            - {name: FLEETPULSE_CA_BUNDLE, value: /etc/fleetpulse/tls/ca.crt}
            - name: FLEETPULSE_AGENT_TOKEN
              valueFrom: {secretKeyRef: {name: fleetpulse-runtime, key: agent-token}}
            - name: FLEETPULSE_AGENT_ID
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
            - name: FLEETPULSE_HOSTNAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
            - {name: FLEETPULSE_BATCH_SIZE, value: "2"}
            - {name: FLEETPULSE_COLLECTION_INTERVAL_SECONDS, value: "2"}
            - {name: FLEETPULSE_SPOOL_PATH, value: /var/lib/fleetpulse/spool.db}
            - {name: FLEETPULSE_LOG_LEVEL, value: INFO}
          ports: [{name: metrics, containerPort: 9103}]
          readinessProbe: {tcpSocket: {port: metrics}, periodSeconds: 3, timeoutSeconds: 2}
          livenessProbe: {tcpSocket: {port: metrics}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 2}
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits: {cpu: 250m, memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: spool, mountPath: /var/lib/fleetpulse}
            - {name: tls, mountPath: /etc/fleetpulse/tls, readOnly: true}
      volumes:
        - {name: spool, emptyDir: {sizeLimit: 128Mi}}
        - {name: tls, secret: {secretName: fleetpulse-tls}}
