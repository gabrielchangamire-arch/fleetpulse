apiVersion: k3d.io/v1alpha5
kind: Simple
metadata: {name: fleetpulse}
servers: 1
agents: 0
ports:
  - {port: "127.0.0.1:8080:30080", nodeFilters: [server:0]}
  - {port: "127.0.0.1:8443:30443", nodeFilters: [server:0]}
options:
  k3s:
    extraArgs:
      - {arg: --disable=traefik, nodeFilters: [server:*]}

