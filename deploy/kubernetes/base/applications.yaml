apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app.kubernetes.io/name: api}
  template:
    metadata:
      labels: {app.kubernetes.io/name: api, app.kubernetes.io/part-of: fleetpulse}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "8000"}
    spec:
      terminationGracePeriodSeconds: 30
      securityContext: {runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, seccompProfile: {type: RuntimeDefault}}
      initContainers:
        - name: wait-for-postgres
          image: fleetpulse-api:dev
          imagePullPolicy: IfNotPresent
          command: [python, -c]
          args:
            - |
              import socket, time
              deadline = time.monotonic() + 120
              while True:
                  try:
                      socket.create_connection(("postgres", 5432), 2).close()
                      break
                  except OSError:
                      if time.monotonic() >= deadline:
                          raise TimeoutError("postgres readiness deadline exceeded")
                      time.sleep(1)
          resources:
            requests: {cpu: 10m, memory: 24Mi}
            limits: {cpu: 100m, memory: 64Mi}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
      containers:
        - name: api
          image: fleetpulse-api:dev
          imagePullPolicy: IfNotPresent
          envFrom: [{configMapRef: {name: fleetpulse-config}}]
          env:
            - name: FLEETPULSE_DATABASE_URL
              valueFrom: {secretKeyRef: {name: fleetpulse-runtime, key: database-url}}
            - name: FLEETPULSE_AGENT_TOKEN
              valueFrom: {secretKeyRef: {name: fleetpulse-runtime, key: agent-token}}
          ports: [{name: http, containerPort: 8000}]
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet: {path: /livez, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          lifecycle:
            preStop: {exec: {command: [sh, -c, "sleep 3"]}}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app.kubernetes.io/name: worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: worker, app.kubernetes.io/part-of: fleetpulse}
    spec:
      terminationGracePeriodSeconds: 30
      securityContext: {runAsNonRoot: true, runAsUser: 999, runAsGroup: 999, seccompProfile: {type: RuntimeDefault}}
      initContainers:
        - name: wait-for-state-services
          image: fleetpulse-worker:dev
          imagePullPolicy: IfNotPresent
          command: [python, -c]
          args:
            - |
              import socket, time
              for endpoint in (("postgres", 5432), ("redis", 6379)):
                  deadline = time.monotonic() + 120
                  while True:
                      try:
                          socket.create_connection(endpoint, 2).close()
                          break
                      except OSError:
                          if time.monotonic() >= deadline:
                              raise TimeoutError(f"readiness deadline exceeded: {endpoint}")
                          time.sleep(1)
          resources:
            requests: {cpu: 10m, memory: 24Mi}
            limits: {cpu: 100m, memory: 64Mi}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
      containers:
        - name: worker
          image: fleetpulse-worker:dev
          imagePullPolicy: IfNotPresent
          envFrom: [{configMapRef: {name: fleetpulse-config}}]
          env:
            - name: FLEETPULSE_DATABASE_URL
              valueFrom: {secretKeyRef: {name: fleetpulse-runtime, key: database-url}}
            - {name: FLEETPULSE_METRICS_PORT, value: "9101"}
          ports: [{name: metrics, containerPort: 9101}]
          readinessProbe: {tcpSocket: {port: metrics}, periodSeconds: 3, timeoutSeconds: 2}
          livenessProbe: {tcpSocket: {port: metrics}, initialDelaySeconds: 10, periodSeconds: 10, timeoutSeconds: 2}
          resources:
            requests: {cpu: 50m, memory: 96Mi}
            limits: {cpu: 400m, memory: 384Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
---
