events {}
http {
    resolver 127.0.0.11 valid=5s ipv6=off;
    map $http_x_request_id $correlation_id { default $http_x_request_id; "" $request_id; }
    upstream fleetpulse_api { zone fleetpulse_api 64k; server api:8000 resolve; }
    server { listen 8080; return 308 https://$host:8443$request_uri; }
    server {
        listen 8443 ssl;
        ssl_certificate /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        client_max_body_size 2m;
        location / {
            proxy_pass http://fleetpulse_api;
            proxy_connect_timeout 2s; proxy_read_timeout 10s; proxy_send_timeout 10s;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $correlation_id;
        }
    }
}
