name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify repository
        run: |
          make PYTHON=python bootstrap
          make verify

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit Python dependencies
        run: |
          python -m pip install pip-audit
          python -m pip install -e ".[dev]"
          python -m pip_audit

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLEETPULSE_AGENT_TOKEN: ci-test-token-not-a-secret
      FLEETPULSE_POSTGRES_PASSWORD: ci-test-password-not-a-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install smoke-test client
        run: python -m pip install .
      - name: Start the local vertical slice
        run: docker compose up -d --build --wait
      - name: Verify idempotent ingestion
        run: |
          python scripts/phase1_smoke.py --token "${FLEETPULSE_AGENT_TOKEN}"
          python scripts/phase2_smoke.py --token "${FLEETPULSE_AGENT_TOKEN}"
      - name: Show service state
        if: always()
        run: docker compose ps
      - name: Preserve failure logs
        if: failure()
        run: docker compose logs --no-color
      - name: Stop services
        if: always()
        run: docker compose down
